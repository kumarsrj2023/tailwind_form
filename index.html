<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Side by Side Form</title>
    <link rel="stylesheet" href="./src/css/output.css" />
</head>

<body>
    <div class="form-page bg-slate-100">
        <div class="form-wrapper min-h-screen px-4 py-10">
            <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-2xl">
                <div class="grid grid-cols-1 lg:grid-cols-2">
                    <!-- left side form -->
                    <div class="form-wrapper p-6 sm:p-8 lg:p-10">
                        <div class="form-header mb-6">
                            <p class="mb-2 text-sm font-semibold uppercase text-blue-600">Registration Form</p>
                            <h2 class="text-3xl font-bold text-slate-900">Please fill the Form</h2>
                            <p class="mt-2 text-sm text-slate-500">Starred field are required</p>
                        </div>

                        <form action="">
                            <div class="form-fields grid grid-cols-1 md:grid-cols-2 gap-4">

                                <div class="form-group">
                                    <label for="" class="block text-sm font-medium text-slate-700 mb-2">
                                        First Name
                                        <span class="text-red-600">*</span>
                                    </label>
                                    <input type="text" id="first-name" name="fname" placeholder="First Name"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
                                </div>

                                <div class="form-group">
                                    <label for="" class="block text-sm text-slate-700 font-medium mb-2">
                                        Last name
                                        <span class="text-red-500">*</span>
                                    </label>
                                    <input type="text" name="lname" id="lname" placeholder="Last Name"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">
                                </div>

                                <div class="form-groups">
                                    <label for="" class="block text-sm text-slate-500 font-medium mb-2">
                                        Email
                                        <span class="text-red-500">*</span>
                                    </label>
                                    <input type="email" name="email" id="email" placeholder="Enter Email"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">
                                </div>
                                <div class="form-groups">
                                    <label for="" class="block text-sm text-slate-500 font-medium mb-2">
                                        Email
                                        <span class="text-red-500">*</span>
                                    </label>
                                    <input type="email" name="email" id="email" placeholder="Enter Email"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">
                                </div>
                                <div class="form-groups">
                                    <label for="" class="block text-sm text-slate-500 font-medium mb-2">
                                        Email
                                        <span class="text-red-500">*</span>
                                    </label>
                                    <input type="email" name="email" id="email" placeholder="Enter Email"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">
                                </div>
                                <div class="form-groups">
                                    <label for="" class="block text-sm text-slate-500 font-medium mb-2">
                                        Email
                                        <span class="text-red-500">*</span>
                                    </label>
                                    <input type="email" name="email" id="email" placeholder="Enter Email"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">
                                </div>

                                    <label for="" class="block text-sm text-slate-500 font-medium mb-2">
                                        Email
                                        <span class="text-red-500">*</span>
                                    </label>
                                    <input type="email" name="email" id="email" placeholder="Enter Email"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">
                                </div>
                                <div class="form-groups">
                                    <label for="" class="block text-sm text-slate-500 font-medium mb-2">
                                        Email
                                        <span class="text-red-500">*</span>
                                    </label>
                                    <input type="email" name="email" id="email" placeholder="Enter Email"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">
                                </div>
                                <div class="form-groups">
                                    <label for="" class="block text-sm text-slate-500 font-medium mb-2">
                                        Email
                                        <span class="text-red-500">*</span>
                                    </label>
                                    <input type="email" name="email" id="email" placeholder="Enter Email"
                                        class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">
                                </div>

                                <div class="form-groups">
                                    <label for="" class="block text-sm font-semibold mb-2">Gender</label>
                                    <select name="gender" id="gender"
                                        class="w-full border border-slate-300 rounded-md px-4 py-3 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">
                                        <option value="mail">Mail</option>
                                        <option value="mail">Femail</option>
                                        <option value="mail">Other</option>
                                    </select>
                                </div>

                                <div class="form-groups md:col-span-2">
                                    <button type="submit" name="Submit"
                                        class="w-full rounded-full px-5 py-3 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 outline-none focus:ring-4 focus:ring-blue-200 cursor-pointer transition">
                                        Submit
                                    </button>
                                </div>
                            </div>
                        </form>


                    </div>

                    <!-- right side -->
                    <div class="flex justify-center items-center">
                        <img src="./assest/form_banner.jpg" alt="" class="w-full object-cover">
                    </div>

                </div>

            </div>

        </div>
    </div>
</body>

</html>
